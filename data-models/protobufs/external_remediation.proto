syntax = "proto3";
package datamodels;

import "google/protobuf/timestamp.proto";
import "health_event.proto";
import "github.com/yandex/protoc-gen-crd/library/go/k8s/protoc_gen_crd/proto/crd.proto";

option go_package = "github.com/nvidia/nvsentinel/data-models/pkg/protos";

// Condition is the wire equivalent of metav1.Condition. The janitor/pkg/condition
// adapter package converts between this proto representation and metav1.Condition
// at the controller boundary so existing controller-runtime helpers
// (meta.SetStatusCondition, meta.IsStatusConditionTrue) continue to work.
message Condition {
  // type is the condition type (e.g. "NVSentinelOwnershipReleased",
  // "ExternalRemediationComplete").
  string type = 1;

  // status is one of "True", "False", "Unknown".
  string status = 2;

  // observedGeneration is the .metadata.generation that the condition was set
  // based upon.
  int64 observedGeneration = 3;

  // lastTransitionTime is the last time the condition transitioned from one
  // status to another.
  google.protobuf.Timestamp lastTransitionTime = 4;

  // reason contains a programmatic identifier indicating the reason for the
  // condition's last transition (e.g. "ReleaseTaintApplied",
  // "AwaitingExternalSystem", "ReleaseTaintFailed").
  string reason = 5;

  // message is a human-readable message indicating details about the
  // transition.
  string message = 6;
}

// ExternalRemediationRequestSpec is the desired state of an ExtRR. The
// HealthEvent describes the fault that produced the ExtRR. The wrapper struct
// leaves room for future ExtRR-specific spec fields (priority, expected duration,
// external-system hints) without requiring changes to the HealthEvent proto.
message ExternalRemediationRequestSpec {
  // healthEvent is a full copy of the triaged HealthEvent that produced this
  // ExtRR. Reuses the existing HealthEvent message by reference; adding a field
  // to HealthEvent propagates here automatically.
  HealthEvent healthEvent = 1;
}

// ExternalRemediationRequestStatus is the observed state of an ExtRR. Status
// transitions are driven by the ExtRR reconciler (NVSentinelOwnershipReleased)
// and the external system (ExternalRemediationComplete) — see ADR-040 for the
// condition state machine.
message ExternalRemediationRequestStatus {
  // conditions represent the latest available observations of the ExtRR's
  // current state. See ADR-040 for the canonical type names and reasons.
  repeated Condition conditions = 1;

  // completionTime is set when the reconciler is done with this ExtRR — the
  // apply terminated (success or NodeNotFound), the close path ran after
  // Complete=True, or operator-initiated cleanup completed. Once set, the
  // reconciler short-circuits to a CheckUnlock-only pass on subsequent
  // reconciles. The TTL reconciler counts the cleanup window from this
  // timestamp, matching the sibling janitor CRDs (RebootNode, TerminateNode,
  // GPUReset).
  google.protobuf.Timestamp completionTime = 2;
}

// ExternalRemediationRequest is the exit door from NVSentinel ownership.
// Created by fault-remediation when triage maps a fault to the CUSTOM
// recommended action (per ADR-036) with a customRecommendedAction configured
// to produce an ExtRR.
//
// See ADR-040 (docs/designs/040-external-remediation-request.md) for the full
// design including the asymmetric ExternalRemediationComplete=True vs False
// handling, the cleanup finalizer, the release taint, and the
// nvsentinel.dgxc.nvidia.com/managed label coordination mechanism.
message ExternalRemediationRequest {
  option (protoc_gen_crd.k8s_crd) = {
    api_group: "nvsentinel.dgxc.nvidia.com",
    kind: "ExternalRemediationRequest",
    plural: "externalremediationrequests",
    singular: "externalremediationrequest",
    short_names: ["extrr"],
    categories: ["nvsentinel"],
    // Cluster-scoped to match the other remediation CRDs (RebootNode,
    // TerminateNode, GPUReset) — an ExtRR represents a node-level claim and
    // operators interact with it by node name, not by namespace.
    scope: ST_CLUSTER
  };
  ExternalRemediationRequestSpec spec = 1;
  ExternalRemediationRequestStatus status = 2;
}
