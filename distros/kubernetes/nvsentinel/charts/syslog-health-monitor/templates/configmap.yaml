# Single ConfigMap holding every file configuration owned by the
# syslog-health-monitor pod. Each data key becomes a file under the mount
# directory (/etc/syslog-health-monitor/) and is referenced by the matching
# CLI flag in the DaemonSet args.
apiVersion: v1
kind: ConfigMap
metadata:
  name: '{{ include "syslog-health-monitor.fullname" . }}-config'
  labels:
    {{- include "syslog-health-monitor.labels" . | nindent 4 }}
data:
  nic-driver.toml: |
    {{- range .Values.nicDriverDetection.patterns }}

    [[nicDriverDetection.patterns]]
    name = {{ .name | quote }}
    enabled = {{ .enabled }}
    {{ if .processingStrategy }}
    processingStrategy = {{ .processingStrategy | quote }}
    {{ end }}
    {{- end }}
  cancellations.toml: |
    {{- range .Values.cancellations }}

    [[checks]]
      name    = {{ .name | quote }}
      enabled = {{ .enabled }}
      {{- range .rules }}

      [[checks.cancellations]]
        onErrorCode      = {{ .onErrorCode | quote }}
        cancelErrorCodes = [{{ range $i, $c := .cancelErrorCodes }}{{ if $i }}, {{ end }}{{ $c | quote }}{{ end }}]
      {{- end }}
    {{- end }}
