apiVersion: v1
kind: ConfigMap
metadata:
  name: '{{ include "syslog-health-monitor.fullname" . }}-nic-driver'
  labels:
    {{- include "syslog-health-monitor.labels" . | nindent 4 }}
data:
  config.toml: |
    [nicDriverDetection]
    {{- $patterns := (default (list) ((default dict .Values.nicDriverDetection).patterns)) }}
    {{- range $patterns }}

    [[nicDriverDetection.patterns]]
    name = {{ .name | quote }}
    enabled = {{ .enabled }}
    {{ if .processingStrategy }}
    processingStrategy = {{ .processingStrategy | quote }}
    {{ end }}
    {{- end }}
