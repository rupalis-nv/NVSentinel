apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "labeler.fullname" . }}
  labels:
    {{- include "labeler.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "labeler.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- if or .Values.podAnnotations .Values.expectedDeviceCounts.enabled }}
      annotations:
        {{- if .Values.expectedDeviceCounts.enabled }}
        checksum/expected-device-counts-config: {{ include "labeler.expectedDeviceCountsConfig" . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      labels:
        {{- include "labeler.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "labeler.fullname" . }}
      {{- if .Values.global.auditLogging.enabled }}
      securityContext:
        fsGroup: 65532
      {{- end }}
      {{- if .Values.global.auditLogging.enabled }}
      initContainers:
        {{- include "nvsentinel.auditLogging.initContainer" . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default ((.Values.global).image).tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--metrics-port"
            - "{{ .Values.global.metricsPort }}"
            {{- if .Values.kataLabelOverride }}
            - "--kata-label"
            - "{{ .Values.kataLabelOverride }}"
            {{- end }}
            {{- if .Values.assumeDriverInstalled }}
            - "--assume-driver-installed"
            {{- end }}
            {{- if .Values.expectedDeviceCounts.enabled }}
            - "--expected-device-counts-config-file"
            - "/etc/nvsentinel/labeler/expected-device-counts.toml"
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          ports:
            - name: metrics
              containerPort: {{ .Values.global.metricsPort }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          {{- if or .Values.global.auditLogging.enabled .Values.expectedDeviceCounts.enabled }}
          volumeMounts:
            {{- if .Values.expectedDeviceCounts.enabled }}
            - name: expected-device-counts-config
              mountPath: /etc/nvsentinel/labeler/expected-device-counts.toml
              subPath: expected-device-counts.toml
              readOnly: true
            {{- end }}
            {{- if .Values.global.auditLogging.enabled }}
            {{- include "nvsentinel.auditLogging.volumeMount" . | nindent 12 }}
            {{- end }}
          {{- end }}
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: LOG_LEVEL
              value: "{{ .Values.logLevel }}"
            {{- if .Values.global.auditLogging.enabled }}
            {{- include "nvsentinel.auditLogging.envVars" . | nindent 12 }}
            {{- end }}
      {{- if or .Values.global.auditLogging.enabled .Values.expectedDeviceCounts.enabled }}
      volumes:
        {{- if .Values.expectedDeviceCounts.enabled }}
        - name: expected-device-counts-config
          configMap:
            name: {{ include "labeler.configMapName" . }}
        {{- end }}
        {{- if .Values.global.auditLogging.enabled }}
        {{- include "nvsentinel.auditLogging.volume" . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with (.Values.global.systemNodeSelector | default .Values.nodeSelector) }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (.Values.global.affinity | default .Values.affinity) }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (.Values.global.systemNodeTolerations | default .Values.tolerations) }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
